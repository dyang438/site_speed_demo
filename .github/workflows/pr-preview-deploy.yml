# Builds the PR head with pnpm, then runs Vercel CLI (pull → build → deploy --prebuilt)
# so you get a stable preview URL for agents and manual testing.
#
# Required repository secrets:
#   VERCEL_TOKEN       — https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — Project → Settings → General (or Team settings)
#   VERCEL_PROJECT_ID  — same
# Optional:
#   POSTGRES_URL       — if your build runs DB migrations (see package.json "build")

name: PR preview deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    # Fork PRs cannot use repository secrets — skip deploy (same pattern as hello-world.yml)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Check out PR head (or default branch on workflow_dispatch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy preview (Vercel)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: pnpm exec tsx gha-scripts/main.ts --run deploy-preview

      - name: Upsert PR comment with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- site-speed-demo:vercel-preview -->';
            const url = '${{ steps.deploy.outputs.deployment_url }}';
            if (!url) {
              core.info('No deployment_url output; skipping comment.');
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = '${{ github.event.pull_request.head.sha }}';
            const shortSha = sha.slice(0, 7);
            const body = [
              marker,
              '',
              '### Preview deployment',
              '',
              '| | |',
              '|---|---|',
              `| **Preview URL** | ${url} |`,
              `| **Commit** | \`${shortSha}\` |`,
              `| **Workflow** | [Run log](${runUrl}) |`,
              '',
              'Use this URL for agent / browser benchmarks.',
            ].join('\n');

            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
