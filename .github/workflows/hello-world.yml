name: Basic Action

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository (PR head = contributor branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Post GitHub Action run to API
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_SECRET: ${{ secrets.API_SECRET }}
        run: pnpm run ci -- --run basic-action

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository (PR head = full PR branch; full git history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and record run (push, dispatch, same-repo PRs)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_SECRET: ${{ secrets.API_SECRET }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: pnpm run ci -- --run build-action

      - name: Build only (fork PRs — secrets unavailable)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        env:
          SKIP_ACTION_RUN_POST: "true"
        run: pnpm run ci -- --run build-action
